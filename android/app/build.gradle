import java.util.regex.Matcher
import java.util.regex.Pattern

apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'com.facebook.react'

apply from: project(':react-native-config').projectDir.getPath() + '/dotenv.gradle'

def parseRedirectUri(String uriValue) {
    if (!uriValue) {
        throw new IllegalStateException('GOOGLE_OAUTH_REDIRECT_URI is not defined. Set it in your .env file or environment.')
    }
    Pattern pattern = Pattern.compile('^([a-zA-Z][\\w+\\-.]*):\\/\\/?([^\\/?#]*)?(\\/[^?#]*)?')
    Matcher matcher = pattern.matcher(uriValue)
    if (!matcher.find()) {
        throw new IllegalStateException('GOOGLE_OAUTH_REDIRECT_URI must be a valid URI with a scheme (received \"' + uriValue + '\").')
    }
    String scheme = matcher.group(1)
    if (!scheme) {
        throw new IllegalStateException('GOOGLE_OAUTH_REDIRECT_URI must specify a URI scheme.')
    }
    String host = matcher.group(2) ?: ''
    String path = matcher.group(3) ?: ''
    return [scheme: scheme, host: host, path: path]
}

react {
    autolinkLibrariesWithApp()
}

/**
 * Runs R8/ProGuard to minify and obfuscate the bytecode on release builds.
 */
def enableProguardInReleaseBuilds = true

/**
 * AGP rejects the build unless minifyEnabled is also on, so this must stay
 * coupled to enableProguardInReleaseBuilds above.
 */
def enableResourceShrinkingInReleaseBuilds = true

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion = rootProject.ext.ndkVersion
    buildToolsVersion = rootProject.ext.buildToolsVersion
    compileSdk = rootProject.ext.compileSdkVersion

    namespace = 'com.expensetracker'
    defaultConfig {
        applicationId = 'com.expensetracker'
        minSdkVersion = rootProject.ext.minSdkVersion
        targetSdkVersion = rootProject.ext.targetSdkVersion
        versionCode = 1
        versionName = '1.0'

        def redirectUri = null
        if (project.hasProperty('GOOGLE_OAUTH_REDIRECT_URI')) {
            redirectUri = project.property('GOOGLE_OAUTH_REDIRECT_URI')
        }
        if (!redirectUri && project.ext.has('env')) {
            redirectUri = project.ext.env.get('GOOGLE_OAUTH_REDIRECT_URI')
        }
        if (!redirectUri) {
            redirectUri = System.getenv('GOOGLE_OAUTH_REDIRECT_URI')
        }
        def redirectParts = parseRedirectUri(redirectUri)
        def manifestValues = [
            appAuthRedirectScheme: redirectParts.scheme,
            appAuthRedirectHost  : redirectParts.host,
            appAuthRedirectPath  : redirectParts.path
        ]
        manifestPlaceholders = (manifestPlaceholders ?: [:]) + manifestValues
    }
    signingConfigs {
        debug {
            storeFile = file('debug.keystore')
            storePassword = 'android'
            keyAlias = 'androiddebugkey'
            keyPassword = 'android'
        }
        release {
            // Resolve release signing credentials from the process/CI environment ONLY.
            // Do NOT mirror parseRedirectUri's .env tier here: keystore passwords are
            // real secrets and must never reach a .env file or the app's BuildConfig.
            def releaseStoreFile = System.getenv('RELEASE_STORE_FILE')
            def releaseStorePassword = System.getenv('RELEASE_STORE_PASSWORD')
            def releaseKeyAlias = System.getenv('RELEASE_KEY_ALIAS')
            def releaseKeyPassword = System.getenv('RELEASE_KEY_PASSWORD')

            // Only configure signing when ALL four are present. Partial config is
            // treated as missing. There is intentionally NO debug-keystore fallback:
            // a release with missing credentials must fail loudly (see the
            // gradle.taskGraph.whenReady guard below), never be silently debug-signed.
            if (releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                storeFile = file(releaseStoreFile)
                storePassword = releaseStorePassword
                keyAlias = releaseKeyAlias
                keyPassword = releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            signingConfig = signingConfigs.debug
        }
        release {
            signingConfig = signingConfigs.release
            minifyEnabled = enableProguardInReleaseBuilds
            shrinkResources = enableResourceShrinkingInReleaseBuilds
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

/**
 * Fail loudly if a RELEASE build is requested without signing credentials.
 *
 * The signingConfigs.release { } closure runs at CONFIGURATION time for every
 * Gradle invocation (including debug builds and IDE Gradle sync). Throwing there
 * would break those. So the check is deferred to the execution phase via
 * taskGraph.whenReady and scoped to release assembly/bundle tasks only — debug
 * builds (pnpm android / assembleDebug) and IDE sync are never affected.
 */
gradle.taskGraph.whenReady { graph ->
    def buildingRelease = graph.allTasks.any { task ->
        task.name == 'assembleRelease' || task.name == 'bundleRelease'
    }
    def releaseSigningConfigured = android.signingConfigs.release.storeFile != null
    if (buildingRelease && !releaseSigningConfigured) {
        throw new IllegalStateException(
            'Release signing credentials are missing. Set RELEASE_STORE_FILE, ' +
            'RELEASE_STORE_PASSWORD, RELEASE_KEY_ALIAS and RELEASE_KEY_PASSWORD ' +
            '(see DEPLOY.md). Refusing to sign a release build with debug keys.')
    }
}

/**
 * Fail fast on Windows when the repository sits too deep for MAX_PATH (260).
 *
 * New Architecture native builds put two long paths below the repo root:
 *   - codegen C++ sources under node_modules (~210 chars; the longest is
 *     VectorIconsMaterialDesignIconsJSI-generated.cpp), and
 *   - object files under android/app/.cxx/<buildType>/<hash>/<abi>/ (~246 chars
 *     even after CMake's automatic object-name shortening — the binding limit).
 * Once the repo root pushes either past 260, ninja aborts mid-compile with an
 * opaque "Filename longer than 260 characters". The object tree binds first, so
 * the budget below is keyed to it. Checked only for real native builds, so IDE
 * Gradle sync and `clean` are unaffected.
 *
 * Two Windows-specific subtleties make this the right place and form for the check:
 *   - A `subst` virtual drive does NOT help: CMake canonicalizes the per-library
 *     paths to the physical location, so the toolchain still sees the long path.
 *   - The JVM's canonicalPath does NOT resolve `subst` (only native code does), so
 *     this guard cannot detect a subst drive masking a deep checkout; it catches a
 *     deep PHYSICAL checkout. The windows-latest CI leg exercises the real path end
 *     to end. canonicalPath is still used so junctions/symlinks resolve correctly.
 */
gradle.taskGraph.whenReady { graph ->
    if (!org.gradle.internal.os.OperatingSystem.current().isWindows()) {
        return
    }
    def buildsNativeCode = graph.allTasks.any { task ->
        task.name.startsWith('assemble') || task.name.startsWith('bundle')
    }
    if (!buildsNativeCode) {
        return
    }
    def repoRootFile = rootProject.projectDir.parentFile
    def repoRoot
    try {
        repoRoot = repoRootFile.canonicalPath
    } catch (IOException ignored) {
        repoRoot = repoRootFile.absolutePath
    }
    def longestArtifactBelowRoot = 246
    def safetyMargin = 4
    if (repoRoot.length() + longestArtifactBelowRoot + safetyMargin > 260) {
        def maxRoot = 260 - longestArtifactBelowRoot - safetyMargin
        throw new IllegalStateException(
            "Repository path '${repoRoot}' (${repoRoot.length()} chars) is too long for " +
            "Windows MAX_PATH (260): New Architecture native builds need a repo root of at " +
            "most ${maxRoot} chars. A 'subst' drive does NOT help (CMake canonicalizes paths). " +
            "Physically relocate the repository to a short path such as C:\\pet " +
            '(see DEPLOY.md > Windows build prerequisites).')
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation('com.facebook.react:react-android')

    if (hermesEnabled.toBoolean()) {
        implementation('com.facebook.react:hermes-android')
    } else {
        implementation jscFlavor
    }
}
